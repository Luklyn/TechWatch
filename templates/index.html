<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Revue de presse tech : agrégateur d'actualités technologiques avec résumés IA">
<title>Ma revue de presse tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:              #121212;
  --surface:         #1e1e1e;
  --surface2:        #2a2a2a;
  --border:          rgba(255,255,255,0.07);
  --red:             #d0021b;
  --red-glow:        rgba(208,2,27,0.18);
  --text:            #e8e8e8;
  --text-secondary:  #aaaaaa;
  --muted:           #666;
  --dim:             #3a3a3a;
  --font-sans:       'DM Sans', sans-serif;
  --font-serif:      'DM Serif Display', serif;
  --radius:          10px;
  --transition:      250ms ease;
  --theme-transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

body.light {
  --bg:              #f4f4f2;
  --surface:         #ffffff;
  --surface2:        #ebebeb;
  --border:          rgba(0,0,0,0.08);
  --text:            #111111;
  --text-secondary:  #666666;
  --muted:           #777;
  --dim:             #bbb;
}
body.light select option { background: #fff; color: #111; }

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background-color var(--theme-transition), color var(--theme-transition);
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

.wrapper { max-width: 1400px; margin: 0 auto; padding: 0 16px; }
@media (min-width: 768px) { .wrapper { padding: 0 24px; } }
@media (min-width: 1024px) { .wrapper { padding: 0 32px; } }
#main { outline: none; }

header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
  margin-bottom: 0;
  backdrop-filter: blur(10px);
  transition: background-color var(--theme-transition), border-color var(--theme-transition);
}
@media (min-width: 768px) { header { padding: 16px 0; } }

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.logo { display: flex; flex-direction: column; gap: 2px; }
.logo-eyebrow {
  font-family: var(--font-serif);
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--red);
  line-height: 1.1;
}
@media (min-width: 768px) { .logo-eyebrow { font-size: 1.9rem; } }
.logo-title {
  font-family: var(--font-sans);
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-secondary);
  line-height: 1.3;
  letter-spacing: 0.3px;
}

.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
}
.tab {
  min-height: 44px;
  padding: 0 20px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background-color var(--transition), color var(--transition);
  flex: 1;
}
.tab.active { background: var(--red); color: #fff; }
.tab:not(.active):hover { color: var(--text); background: var(--surface2); }

.btn-theme {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  cursor: pointer;
  font-size: 18px;
  min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color var(--transition), color var(--transition);
  flex-shrink: 0;
}
.btn-theme.rotating { animation: sunRotate 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
@keyframes sunRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.meta-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 0;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.count-badge {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 12px;
  letter-spacing: 0.3px;
}
.last-update { font-size: 11px; color: var(--dim); margin-left: auto; }

.btn-refresh {
  min-height: 44px;
  padding: 0 16px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: color var(--transition), border-color var(--transition);
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.btn-refresh:hover { color: var(--red); border-color: var(--red); }
.btn-refresh.spinning .refresh-icon { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 20px;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
  z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.error-banner {
  background: rgba(208,2,27,0.1);
  border: 1px solid rgba(208,2,27,0.3);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 13px;
  color: #ff7a7a;
  margin-bottom: 12px;
  line-height: 1.4;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  padding-bottom: 80px;
  margin-top: 0;
}
@media (min-width: 640px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CARTE SIMPLIFIÉE */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  cursor: pointer;
  animation: fadeUp 0.35s ease both;
}

.card:hover, .card:focus {
  border-color: rgba(208,2,27,0.6);
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  outline: none;
}

/* ÉTAT LU : FLOUTAGE */
.card.is-read .card-content-wrap {
  filter: blur(5px);
  opacity: 0.5;
  pointer-events: none;
}

/* BADGE LU AVEC COCHE */
.card.is-read::after {
  content: '✓ Lu';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--red);
  color: #fff;
  font-size: 13px; font-weight: 700;
  padding: 8px 18px;
  border-radius: 25px;
  z-index: 10;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  display: flex; align-items: center; gap: 6px;
  pointer-events: none;
}

/* Bouton pour réinitialiser le statut */
.card .btn-unread {
  position: absolute;
  top: 10px; right: 10px;
  z-index: 20;
  opacity: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 10px; padding: 4px 8px;
  border-radius: 6px; cursor: pointer;
  transition: opacity 0.2s;
}
.card.is-read:hover .btn-unread { opacity: 1; }

.card-thumb-wrap {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  background: var(--surface2);
  flex-shrink: 0;
}
.card-thumb {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}
.card:hover .card-thumb { transform: scale(1.03); }

.card-body {
  padding: 14px 16px;
  display: flex; flex-direction: column;
  gap: 7px; flex: 1;
}
.card-source {
  font-size: 9.5px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--red);
}
.card-title {
  font-size: 13.5px; font-weight: 600;
  line-height: 1.45;
  color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-summary {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}
.card-footer {
  display: flex; align-items: center;
  gap: 8px;
  border-top: 1px solid var(--border);
  padding-top: 10px; margin-top: 4px;
}
.card-date {
  font-size: 13px;
  color: var(--text-secondary);
}

.btn-get-summary {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--red);
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  margin-left: auto;
}

/* SKELETONS */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 6px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
.card-skeleton {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.sk-img  { aspect-ratio: 16/9; width: 100%; border-radius: 0; }
.sk-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.sk-src  { height: 9px;  width: 60px; }
.sk-t1   { height: 14px; width: 100%; }
.sk-t2   { height: 14px; width: 75%; }
.sk-sum  { height: 11px; width: 90%; }
.sk-date { height: 11px; width: 50%; margin-top: 4px; }

.state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
}
.state-icon { font-size: 48px; margin-bottom: 16px; }

.btn-top {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 44px; height: 44px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(208,2,27,0.4);
  opacity: 0; pointer-events: none;
  z-index: 90;
  transition: 0.25s ease;
}
.btn-top.visible { opacity: 1; pointer-events: all; }

/* MODAL */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: 0.25s ease;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border-radius: 16px;
  width: 100%; max-width: 640px; max-height: 88vh;
  overflow-y: auto;
  display: flex; flex-direction: column;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7);
}
.modal-header { padding: 22px 24px 16px; border-bottom: 1px solid var(--border); }
.modal-source { font-size: 10px; font-weight: 700; color: var(--red); text-transform: uppercase; }
.modal-title { font-family: var(--font-serif); font-size: 1.25rem; margin: 8px 0; }
.modal-body { padding: 24px; }
.modal-ai-label { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 14px; }
.modal-summary { font-size: 14.5px; line-height: 1.75; color: var(--text-secondary); }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
.btn-original { background: var(--red); color: #fff; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 13px; }
.btn-tts { width: 44px; height: 44px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; }
.btn-tts.playing { color: var(--red); border-color: var(--red); }

/* LAYOUT MENU */
.app-layout { display: flex; align-items: flex-start; }
.side-menu {
  width: 240px; flex-shrink: 0; position: sticky; top: 73px;
  padding: 20px 0; display: flex; flex-direction: column; gap: 24px;
  border-right: 1px solid var(--border); max-height: calc(100vh - 73px); overflow-y: auto;
}
.search-wrap { position: relative; padding: 0 16px; }
.side-search {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); padding: 8px 12px 8px 36px; outline: none;
}
.side-section-label { font-size: 9px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); padding: 0 16px; margin-bottom: 6px; }
.side-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; border-radius: 6px; margin: 0 8px; }
.side-item.active { background: rgba(208,2,27,0.18); }
.side-item.active .side-item-label { color: var(--text); font-weight: 600; }
.main-content { flex: 1; min-width: 0; padding-left: 28px; }

@media (max-width: 768px) {
  .side-menu { display: none; }
  .main-content { padding-left: 0; }
}
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="header-inner">
      <div class="logo">
        <h1 class="logo-eyebrow">Tech Watch</h1>
        <span class="logo-title">Ma revue de presse tech</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="tabs" id="main-tabs">
          <button class="tab active" data-type="articles">Articles</button>
          <button class="tab" data-type="videos">YouTube</button>
        </div>
        <button class="btn-theme" id="btn-theme">🌙</button>
      </div>
    </div>
  </header>

  <main id="main">
    <div class="app-layout">
      <nav class="side-menu" id="side-menu">
        <div class="search-wrap">
          <input type="text" id="side-search" class="side-search" placeholder="Rechercher...">
        </div>
        <div>
          <div class="side-section-label">Sources</div>
          <div id="source-list"></div>
        </div>
        <div>
          <div class="side-section-label">Période</div>
          <div class="period-filter" id="period-filter">
            <div class="side-item active" data-period="">Toutes</div>
            <div class="side-item" data-period="today">Aujourd'hui</div>
            <div class="side-item" data-period="week">Semaine</div>
          </div>
        </div>
      </nav>

      <div class="main-content">
        <div class="meta-bar">
          <span class="count-badge" id="count">Chargement…</span>
          <button class="btn-refresh" id="btn-refresh">↻ Actualiser</button>
          <span class="last-update" id="last-update"></span>
        </div>
        <div id="errors"></div>
        <div class="grid" id="grid"></div>
        <div id="sentinel" style="height:1px;"></div>
      </div>
    </div>
  </main>
</div>

<button class="btn-top" id="btn-top">↑</button>
<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-source" id="modal-source"></span>
      <h2 class="modal-title" id="modal-title-el"></h2>
    </div>
    <div class="modal-body">
      <div class="modal-ai-label">Résumé par IA</div>
      <p class="modal-summary" id="modal-summary"></p>
    </div>
    <div class="modal-footer">
      <a class="btn-original" id="modal-link" href="#" target="_blank">↗ Lire</a>
      <button class="btn-tts" id="btn-tts">🔊</button>
      <button class="btn-close-modal" id="btn-close-modal">Fermer</button>
    </div>
  </div>
</div>

<script>
const state = { type: 'articles', search: '', source: '', period: '' };
let allItems = [];
let displayedCount = 0;
const PAGE_SIZE = 20;

const grid = document.getElementById('grid');
const countBadge = document.getElementById('count');
const lastUpdate = document.getElementById('last-update');
const refreshBtn = document.getElementById('btn-refresh');
const sideSearchEl = document.getElementById('side-search');
const sourceListEl = document.getElementById('source-list');
const backdrop = document.getElementById('modal-backdrop');
const modalSummary = document.getElementById('modal-summary');

const READ_KEY = 'read_articles';
function getReadSet() {
  try { return new Set(JSON.parse(localStorage.getItem(READ_KEY) || '[]')); }
  catch { return new Set(); }
}

function markAsRead(url) {
  const read = getReadSet();
  read.add(url);
  localStorage.setItem(READ_KEY, JSON.stringify([...read].slice(-500)));
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cardHTML(item) {
  return `
    <article class="card" data-url="${escHtml(item.link)}">
      <button class="btn-unread">↩ Non lu</button>
      <div class="card-content-wrap">
        <div class="card-thumb-wrap">
          <img class="card-thumb" src="${item.image || 'https://via.placeholder.com/300x170'}" loading="lazy">
        </div>
        <div class="card-body">
          <span class="card-source">${escHtml(item.source)}</span>
          <h2 class="card-title">${escHtml(item.title)}</h2>
          <div class="card-footer">
            <span class="card-date">${item.date_display}</span>
            <button class="btn-get-summary">✦ Résumé IA</button>
          </div>
        </div>
      </div>
    </article>`;
}

function applyReadState() {
  const read = getReadSet();
  grid.querySelectorAll('.card').forEach(card => {
    if (read.has(card.dataset.url)) card.classList.add('is-read');
  });
}

function attachEvents() {
  grid.querySelectorAll('.card').forEach(card => {
    const url = card.dataset.url;
    
    card.addEventListener('click', (e) => {
      if (e.target.closest('.btn-get-summary') || e.target.closest('.btn-unread')) return;
      markAsRead(url);
      card.classList.add('is-read');
      window.open(url, '_blank');
    });

    card.querySelector('.btn-get-summary').addEventListener('click', (e) => {
      e.stopPropagation();
      markAsRead(url);
      card.classList.add('is-read');
      openModal(card.querySelector('.card-title').textContent, url, card.querySelector('.card-source').textContent);
    });

    card.querySelector('.btn-unread').addEventListener('click', (e) => {
      e.stopPropagation();
      const read = getReadSet();
      read.delete(url);
      localStorage.setItem(READ_KEY, JSON.stringify([...read]));
      card.classList.remove('is-read');
    });
  });
}

function openModal(title, url, source) {
  document.getElementById('modal-title-el').textContent = title;
  document.getElementById('modal-source').textContent = source;
  document.getElementById('modal-link').href = url;
  modalSummary.textContent = "Génération du résumé...";
  backdrop.classList.add('open');
  
  fetch('/api/summarize', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url, title })
  })
  .then(r => r.json())
  .then(data => { modalSummary.textContent = data.summary; })
  .catch(() => { modalSummary.textContent = "Erreur de résumé."; });
}

async function load(forceRefresh = false) {
  grid.innerHTML = '<div class="state">Chargement...</div>';
  const params = new URLSearchParams({ type: state.type, search: state.search, source: state.source, period: state.period, refresh: forceRefresh ? '1' : '0' });
  
  try {
    const res = await fetch(`/api/feed?${params}`);
    const data = await res.json();
    allItems = data.items;
    grid.innerHTML = allItems.map(item => cardHTML(item)).join('');
    countBadge.textContent = `${data.total} résultats`;
    
    // Update Source list
    sourceListEl.innerHTML = `<div class="side-item ${state.source===''?'active':''}" data-src="">Toutes</div>` + 
      data.sources.map(s => `<div class="side-item ${state.source===s?'active':''}" data-src="${s}">${s}</div>`).join('');
    
    sourceListEl.querySelectorAll('.side-item').forEach(i => i.onclick = () => { state.source = i.dataset.src; load(); });

    applyReadState();
    attachEvents();
  } catch (e) { grid.innerHTML = "Erreur."; }
}

document.getElementById('btn-close-modal').onclick = () => backdrop.classList.remove('open');
refreshBtn.onclick = () => load(true);
sideSearchEl.oninput = (e) => { state.search = e.target.value; load(); };

// Tabs
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  t.classList.add('active');
  state.type = t.dataset.type;
  load();
});

load();
</script>
</body>
</html>
