<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma revue de presse tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables (Identiques à ton index 5) ────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #121212; --surface: #1e1e1e; --surface2: #2a2a2a;
  --border: rgba(255,255,255,0.07); --red: #d0021b; --red-glow: rgba(208,2,27,0.18);
  --text: #e8e8e8; --text-secondary: #aaaaaa; --muted: #666;
  --font-sans: 'DM Sans', sans-serif; --font-serif: 'DM Serif Display', serif;
  --radius: 10px; --transition: 250ms ease;
}
body.light {
  --bg: #f4f4f2; --surface: #ffffff; --surface2: #ebebeb;
  --border: rgba(0,0,0,0.08); --text: #111111; --text-secondary: #666666;
}

body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; transition: background-color 0.5s; }
.wrapper { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* ── Header & Toolbar ───────────────────────────────────────────────────── */
header { border-bottom: 1px solid var(--border); padding: 20px 0; margin-bottom: 24px; }
.header-inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.logo-title { font-family: var(--font-serif); font-size: 1.9rem; }

.tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
.tab { padding: 8px 16px; border-radius: 6px; border: none; background: transparent; color: var(--muted); font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 11px; }
.tab.active { background: var(--red); color: #fff; }

.toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
input[type="text"], select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: var(--radius); height: 44px; outline: none; }
#search { flex: 1; }

/* ── Grid & Cards ───────────────────────────────────────────────────────── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 50px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: all 0.3s ease; cursor: pointer; }
.card:hover { transform: translateY(-5px); border-color: var(--red); }
.card.read { opacity: 0.6; filter: grayscale(0.4); }

.card-thumb-wrap { width: 100%; aspect-ratio: 16/9; background: var(--surface2); overflow: hidden; }
.card-thumb { width: 100%; height: 100%; object-fit: cover; }
.card-body { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.card-source { font-size: 10px; color: var(--red); font-weight: 700; text-transform: uppercase; }
.card-title { font-size: 14px; font-weight: 600; line-height: 1.4; }
.card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 10px; margin-top: auto; }
.card-date { font-size: 12px; color: var(--muted); }

/* ── BOUTON GLOSSY DYNAMIQUE ────────────────────────────────────────────── */
.btn-get-summary {
  position: relative; overflow: hidden; height: 34px; padding: 0 15px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-secondary); font-size: 11px; font-weight: 700; cursor: pointer;
}
.btn-text-wrapper { display: flex; flex-direction: column; transition: transform 0.3s; height: 100%; }
.btn-text-wrapper span { height: 100%; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
.btn-get-summary:hover .btn-text-wrapper { transform: translateY(-100%); }
.btn-get-summary:hover { border-color: var(--red); color: var(--red); }
.btn-get-summary::after {
  content: ""; position: absolute; top: -50%; left: -100%; width: 40px; height: 200%;
  background: rgba(255,255,255,0.1); transform: rotate(25deg); transition: left 0.5s;
}
.btn-get-summary:hover::after { left: 150%; }

/* ── Modal & States ─────────────────────────────────────────────────────── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
.modal-backdrop.open { display: flex; }
.modal { background: var(--surface); padding: 30px; border-radius: 16px; width: 90%; max-width: 600px; border: 1px solid var(--border); }
.skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; height: 200px; border-radius: 10px; }
@keyframes shimmer { to { background-position: -200% 0; } }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="header-inner">
      <h1 class="logo-title">Tech Watch</h1>
      <div class="tabs">
        <button class="tab active" data-type="articles">Articles</button>
        <button class="tab" data-type="videos">Vidéos</button>
      </div>
      <button id="btn-theme" style="background:none; border:none; cursor:pointer; font-size:20px;">🌙</button>
    </div>
  </header>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Rechercher...">
    <select id="filter-source"><option value="">Sources</option></select>
    <button id="btn-refresh" style="background:var(--surface); border:1px solid var(--border); color:var(--text); padding:0 15px; border-radius:10px; cursor:pointer;">↻ Actualiser</button>
  </div>

  <div id="grid" class="grid"></div>
  <div id="sentinel"></div>
</div>

<div id="modal-backdrop" class="modal-backdrop">
  <div class="modal">
    <h2 id="modal-title" style="margin-bottom:15px; font-family:var(--font-serif);"></h2>
    <p id="modal-summary" style="line-height:1.6; color:var(--text-secondary); margin-bottom:20px;"></p>
    <button id="close-modal" style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">Fermer</button>
  </div>
</div>

<script>
const state = { type: 'articles', search: '', source: '', page: 1 };
let allItems = [];
let isLoading = false;

async function loadFeed(force = false) {
  if (isLoading) return;
  isLoading = true;
  const grid = document.getElementById('grid');
  if (force) grid.innerHTML = '<div class="skeleton"></div>';

  try {
    const params = new URLSearchParams({...state, refresh: force ? '1' : '0'});
    const response = await fetch(`/api/feed?${params}`);
    const data = await response.json();
    
    allItems = data.items;
    renderCards();
    
    // Update sources
    const sourceSelect = document.getElementById('filter-source');
    sourceSelect.innerHTML = '<option value="">Toutes les sources</option>' + 
      data.sources.map(s => `<option value="${s}">${s}</option>`).join('');
  } catch (e) {
    console.error("Erreur Render:", e);
  } finally {
    isLoading = false;
  }
}

function renderCards() {
  const grid = document.getElementById('grid');
  const readList = JSON.parse(localStorage.getItem('read_articles') || '[]');
  
  grid.innerHTML = allItems.map((item, idx) => `
    <article class="card ${readList.includes(item.link) ? 'read' : ''}" onclick="openArticle('${item.link}')">
      <div class="card-thumb-wrap">
        <img src="${item.image || ''}" class="card-thumb" onerror="this.src='https://via.placeholder.com/400x225?text=Tech'">
      </div>
      <div class="card-body">
        <span class="card-source">${item.source}</span>
        <h2 class="card-title">${item.title}</h2>
        <div class="card-footer">
          <span class="card-date">📅 ${item.date_display}</span>
          <button class="btn-get-summary" onclick="event.stopPropagation(); getAISummary('${item.link}', '${item.title.replace(/'/g, "\\'")}')">
            <div class="btn-text-wrapper">
              <span>✦ Résumé IA</span>
              <span>Lancer l'IA</span>
            </div>
          </button>
        </div>
      </div>
    </article>
  `).join('');
}

function openArticle(url) {
  const read = JSON.parse(localStorage.getItem('read_articles') || '[]');
  if (!read.includes(url)) {
    read.push(url);
    localStorage.setItem('read_articles', JSON.stringify(read));
  }
  window.open(url, '_blank');
  renderCards();
}

async function getAISummary(url, title) {
  const modal = document.getElementById('modal-backdrop');
  const summaryText = document.getElementById('modal-summary');
  document.getElementById('modal-title').innerText = title;
  summaryText.innerText = "Génération du résumé par l'IA...";
  modal.classList.add('open');

  try {
    const res = await fetch('/api/summarize', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, title})
    });
    const data = await res.json();
    summaryText.innerText = data.summary;
  } catch {
    summaryText.innerText = "Erreur lors du résumé.";
  }
}

document.getElementById('close-modal').onclick = () => document.getElementById('modal-backdrop').classList.remove('open');
document.getElementById('btn-refresh').onclick = () => loadFeed(true);
document.getElementById('search').oninput = (e) => { state.search = e.target.value; loadFeed(); };

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelector('.tab.active').classList.remove('active');
    tab.classList.add('active');
    state.type = tab.dataset.type;
    loadFeed();
  };
});

// Init
loadFeed();
</script>
</body>
</html>
